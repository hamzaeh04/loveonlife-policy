<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Love On Life Support</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
      background: linear-gradient(135deg, #6a11cb, #2575fc);
      min-height: 100vh;

      /* center everything */
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;

      color: #333;
    }

    .container {
      width: 100%;
      max-width: 500px;
      padding: 20px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 25px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      margin-bottom: 20px;
      text-align: center;
    }

    h1 {
      margin-bottom: 5px;
    }

    .tagline {
      color: #777;
      margin-bottom: 10px;
    }

    h2 {
      margin-bottom: 10px;
    }

    p {
      margin-bottom: 10px;
      line-height: 1.5;
    }

    a {
      color: #2575fc;
      text-decoration: none;
      font-weight: 500;
    }

    .email {
      display: inline-block;
      margin-top: 10px;
      padding: 10px 15px;
      border-radius: 10px;
      background: #2575fc;
      color: #fff;
    }

    footer {
      margin-top: 15px;
      text-align: center;
      color: #eee;
      font-size: 14px;
      width: 100%;
    }

    @media (max-width: 500px) {
      .card {
        padding: 20px;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <!-- Header -->
    <div class="card">
      <h1>Love On Life</h1>
      <p class="tagline">Connecting People to Purpose</p>
    </div>

    <!-- About -->
    <div class="card">
      <h2>About</h2>
      <p>
        Love On Life helps users discover and join meaningful events, 
        support causes, and engage with their community to create real social impact.
      </p>
    </div>

    <!-- Support -->
    <div class="card">
      <h2>Support</h2>
      <p>Need help or have questions?</p>

      <a class="email" href="mailto:loveonlifefoundation@gmail.com">
        loveonlifefoundation@gmail.com
      </a>
    </div>

  </div>

  <!-- Footer -->
  <footer>
    © 2026 Love On Life Foundation Inc
  </footer>

</body>
</html>
